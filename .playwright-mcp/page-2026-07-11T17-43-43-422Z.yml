    - generic [ref=f1e165]:
      - heading "Frequently asked questions" [level=2] [ref=f1e166]
      - generic [ref=f1e167]:
        - generic [ref=f1e168]:
          - heading "Do I need a credit card to start?" [level=3] [ref=f1e169]
          - paragraph [ref=f1e170]: No. The Community plan is free forever and requires no payment details. The Pro trial also starts without a card.
        - generic [ref=f1e171]:
          - heading "What exactly does an Event Pass cover?" [level=3] [ref=f1e172]
          - paragraph [ref=f1e173]: One competition, for its lifetime. That competition gets 10 divisions, 32 entrants per division, advanced formats, entry fees, branding, exports and realtime — and it stops counting against your free active-competition slot. Other competitions in your org stay on Community limits.
        - generic [ref=f1e174]:
          - heading "I bought an Event Pass and later went Pro — what happens?" [level=3] [ref=f1e175]
          - paragraph [ref=f1e176]: Pro covers everything the pass does, org-wide, so the pass sits dormant. If you ever cancel Pro, passed competitions stay upgraded — passes never expire.
        - generic [ref=f1e177]:
          - heading "What happens when my Pro trial or subscription ends?" [level=3] [ref=f1e178]
          - paragraph [ref=f1e179]: Your org drops back to Community limits automatically. Nothing is deleted — competitions over the limit become read-only until you archive down to quota or upgrade again.
        - generic [ref=f1e180]:
          - heading "Can I charge entry fees?" [level=3] [ref=f1e181]
          - paragraph [ref=f1e182]: Yes — with an Event Pass (5% platform fee on that competition) or on Pro (2% org-wide). Connect your club's Stripe account and fees from online registration are paid out directly to the club. Free-event registration works on every plan.
        - generic [ref=f1e183]:
          - heading "Which currencies can I pay in?" [level=3] [ref=f1e184]
          - paragraph [ref=f1e185]: USD, EUR, GBP, INR and AUD — use the switcher above. Your first checkout pins the currency for future renewals.
        - generic [ref=f1e186]:
          - heading "Is there an annual discount?" [level=3] [ref=f1e187]
          - paragraph [ref=f1e188]: Yes — annual billing is two months free (17% off), and it's the default on the Pro card above.
        - generic [ref=f1e189]:
          - heading "Can I cancel any time?" [level=3] [ref=f1e190]
          - paragraph [ref=f1e191]: Yes. Cancel from Settings → Billing. Your Pro access continues until the end of the billing period.
    - generic [ref=f1e192]:
      - heading "Start for free today" [level=2] [ref=f1e193]
      - paragraph [ref=f1e194]: No card required. Upgrade a single event, or the whole club, when it grows.
      - link "Create your free account →" [ref=f1e195] [cursor=pointer]:
        - /url: /login?tab=signup
