app = "seazn-club-stg"
primary_region = "lhr"

# Runtime env (non-secret). OAUTH_BASE_URL makes server-side redirect/base-URL
# resolution deterministic behind Fly's proxy (req.url is the internal
# 0.0.0.0:3000 binding; NEXT_PUBLIC_* build args are not in server process.env).
[env]
  OAUTH_BASE_URL   = "https://seazn-club-stg.fly.dev"
  NEXT_PUBLIC_BASE_URL = "https://seazn-club-stg.fly.dev"

[build]
  [build.args]
    NEXT_PUBLIC_SUPABASE_URL           = "https://hoksroegadfdfwererzu.supabase.co"
    NEXT_PUBLIC_SUPABASE_ANON_KEY      = "sb_publishable_jsKiT5L45u-yNlyCMIDGCg_GIIoj4H9"
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = "pk_test_51C2ImvAy22H0xqqxi73ya0Xen6LeJG5GlRSHm7OpTnlQ2Nw1RFHt1pzJ61HyWgeQCu1IueWV7yterQK8yIUCrzeK00YnXPGvrn"
    NEXT_PUBLIC_BASE_URL               = "https://seazn-club-stg.fly.dev"
    NEXT_PUBLIC_POSTHOG_KEY            = "phc_rjdhs5RCqJEg5jTH3UG4Dt9DxsLemdiejW3Upkbe4ERM"
    NEXT_PUBLIC_POSTHOG_HOST           = "https://eu.posthog.com"
    # NEXT_PUBLIC_SENTRY_DSN           = "https://..."

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0            # staging can cold-start; saves cost

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    protocol     = "http"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
