name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Fast, DB-free gate: typecheck + the full unit / property / grid suite.
  # -------------------------------------------------------------------------
  test:
    name: Unit + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace apps/web
      - run: npm run typecheck --workspace packages/engine
      - run: npm run engine:check
      - run: npm run engine:boundary
      - name: OpenAPI spec drift gate (PROMPT-11)
        run: |
          npm run openapi:gen
          git diff --exit-code openapi/v1.json || {
            echo "openapi/v1.json is stale — run 'npm run openapi:gen' and commit."; exit 1; }
      - run: npm test --workspace apps/web
      - run: npm test --workspace packages/engine

  # -------------------------------------------------------------------------
  # Security gate (doc 07 §4): secret scan + dependency audit. Secret leaks
  # block; the dependency audit is advisory (won't block on a pre-existing
  # transitive advisory) but stays visible.
  # -------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # advisory: action's PR-API call is flaky; findings still surface
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Integration gate: real Postgres container -> real HTTP -> real DB.
  # Exercises the tournament.ts -> engine delegation end to end.
  # -------------------------------------------------------------------------
  smoke:
    name: Smoke (Postgres container)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Superuser connection so the app can `set role app_user` (RLS). Local =>
      # no SSL. Port 5432 keeps prepared statements on (not the Supabase pooler).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_SSL: disable
      # Session signing secret (jose HS256) — CI-only dummy.
      AUTH_SECRET: ci-only-insecure-secret-please-change-in-prod-0123456789
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Bootstrap database (schema + migrations)
        run: npm run db:apply

      - name: RLS guard (every org_id table isolated)
        run: npm run check:rls

      - name: Sync sport catalog from the engine registry
        run: npm run sync:sports

      - name: Engine-db + service-layer integration tests (real Postgres)
        run: npm test --workspace apps/web -- run src/server

      - name: Start dev server
        run: |
          npm run dev > dev-server.log 2>&1 &
          echo "waiting for server…"
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000/api/health >/dev/null; then
              echo "server up after ${i}s window"; exit 0
            fi
            sleep 2
          done
          echo "server did not become healthy"; cat dev-server.log; exit 1

      - name: Run smoke test
        run: npm run test:smoke

      - name: Dev server log (on failure)
        if: failure()
        run: cat dev-server.log || true

  # -------------------------------------------------------------------------
  # Deploy to the staging Fly app. Only on push to main, and only once both
  # gates above are green. PRs never deploy.
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: [test, smoke, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.stg.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_TOKEN }}
