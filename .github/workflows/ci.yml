name: CI

# Test gates (test/smoke/security) run on PULL REQUESTS ONLY — a squash-merge
# lands the exact tree the PR already validated, so re-running them on the
# main push would test the same code twice. The push:main trigger stays
# solely to drive the staging deploy, which trusts the PR gates.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # Fast, DB-free gate: typecheck + the full unit / property / grid suite.
  # -------------------------------------------------------------------------
  test:
    name: Unit + typecheck
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Engine coverage + sim matrix only run when the engine (or the
      # dependency graph) changed — most PRs touch apps/web only.
      - uses: dorny/paths-filter@v3
        id: engine-changes
        with:
          filters: |
            engine:
              - 'packages/engine/**'
              - 'package-lock.json'
              - 'pnpm-lock.yaml'
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck --workspace apps/web
      - run: npm run typecheck --workspace packages/engine
      - run: npm run engine:boundary
      # v3/03 §6: retired plan tier must never reappear in UI copy.
      - name: Plan-scrub grep gate (PROMPT-32)
        run: bash scripts/check-plan-scrub.sh
      - name: OpenAPI spec drift gate (PROMPT-11)
        run: |
          npm run openapi:gen
          git diff --exit-code openapi/v1.json || {
            echo "openapi/v1.json is stale — run 'npm run openapi:gen' and commit."; exit 1; }
      - run: npm test --workspace apps/web
      # Engine suite includes the PROMPT-14 simulation harness (SIM_RUNS
      # defaults to 200 divisions per sport×format when CI=true) and the
      # coverage gate (≥90% lines; 100% on core/ and tiebreakers.ts).
      - run: npm run test:coverage --workspace packages/engine
        if: steps.engine-changes.outputs.engine == 'true'
      # Sim matrix (v3/09 §3): bounded profile — every module × format ×
      # SIM_SEEDS seeds + the permanent scenario suites; emits sim-report.json.
      # A failure line prints its reproducing seed token.
      - name: Sim matrix (bounded CI profile)
        if: steps.engine-changes.outputs.engine == 'true'
        run: SIM_SEEDS=5 npm run sim:matrix --workspace packages/engine
      - name: Sim report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-report
          path: packages/engine/sim-report.json
          if-no-files-found: ignore
      - name: Simulation failure artifacts (repro with `npm run sim:replay -- <seedToken>`)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-failures
          path: packages/engine/sim-failures/
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # Security gate (doc 07 §4): secret scan + dependency audit. Secret leaks
  # block; the dependency audit is advisory (won't block on a pre-existing
  # transitive advisory) but stays visible.
  # -------------------------------------------------------------------------
  security:
    name: Security scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # advisory: action's PR-API call is flaky; findings still surface
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

  # -------------------------------------------------------------------------
  # Integration gate: real Postgres container -> real HTTP -> real DB.
  # Exercises the /api/v1 service layer + engine-db adapter end to end.
  # -------------------------------------------------------------------------
  smoke:
    name: Smoke (Postgres container)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Stock Redis speaks the same protocol as Upstash (our client is ioredis
      # over REDIS_URL, not the Upstash REST SDK), so this exercises the real
      # rate-limiter path — Lua EVAL, TTL, 429 — end to end in CI.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Superuser connection so the app can `set role app_user` (RLS). Local =>
      # no SSL. Port 5432 keeps prepared statements on (not the Supabase pooler).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DATABASE_SSL: disable
      # Session signing secret (jose HS256) — CI-only dummy.
      AUTH_SECRET: ci-only-insecure-secret-please-change-in-prod-0123456789
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Flyway CLI is downloaded by scripts/flyway.sh on first use; cache it
      # per pinned version so CI doesn't re-download every run.
      - name: Cache Flyway CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/seazn-flyway
          key: flyway-cli-10.22.0-linux-x64

      - name: Bootstrap database (Flyway migrate)
        run: npm run db:apply

      - name: Flyway migration history
        run: npm run db:info

      - name: RLS guard (every org_id table isolated)
        run: npm run check:rls

      - name: Sync sport catalog from the engine registry
        run: npm run sync:sports

      - name: Engine-db + service-layer integration tests (real Postgres)
        run: npm test --workspace apps/web -- run src/server

      # REDIS_URL is scoped to this step only. Setting it job-wide would switch
      # the entitlement cache (lib/entitlements.ts) on for the src/server suite,
      # whose tests mutate entitlements via raw SQL without invalidating the
      # cache — stale reads, false failures. The limiter test is self-contained.
      - name: Rate-limiter integration tests (real Redis)
        run: npm test --workspace apps/web -- run src/lib/__tests__/rate-limit.redis.test.ts
        env:
          REDIS_URL: redis://localhost:6379

      # Smoke runs against a PRODUCTION build, not `next dev`. The dev server
      # restarts itself once used heap crosses 80% of its V8 limit (which
      # `next dev` pins to HALF the machine's RAM — ~3.5 GB on the 7 GB
      # runner, vs ~16 GB on a dev laptop, which is why this only ever died
      # in CI). Near that ceiling Turbopack's on-demand route compiles also
      # started 404ing transiently. `next start` has neither the watchdog nor
      # per-request compiles — and it's what production runs anyway.

      # Persist the compiler cache between runs so the production build only
      # pays for what changed (nextjs.org/docs/pages/guides/ci-build-caching).
      # Source-hash key with a lockfile restore-key: exact hit on unchanged
      # source, warm partial cache otherwise.
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('apps/web/src/**/*.js', 'apps/web/src/**/*.jsx', 'apps/web/src/**/*.ts', 'apps/web/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build (production)
        run: npm run build --workspace apps/web
        env:
          # tsc gate already ran in the test job — don't type-check twice.
          SKIP_TYPECHECK: "1"

      - name: Start server
        run: |
          npm run start --workspace apps/web > dev-server.log 2>&1 &
          echo "waiting for server…"
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3000/api/health >/dev/null; then
              echo "server up after ${i}s window"; exit 0
            fi
            sleep 2
          done
          echo "server did not become healthy"; cat dev-server.log; exit 1

      - name: Run smoke test
        run: npm run test:smoke

      # The Playwright UI e2e suite moved to its own workflow (e2e.yml): it
      # runs on pushes to main, or on demand against a PR by number.

      - name: Dev server log (on failure)
        if: failure()
        run: cat dev-server.log || true

  # -------------------------------------------------------------------------
  # CD (staging): Flyway migrate against the staging database, THEN deploy the
  # app to Fly. Only on push to main, and only once every gate above is green;
  # PRs never deploy. Migration-before-deploy means every migration must be
  # backward compatible with the app version still running (expand/contract) —
  # if the migrate step fails, the old app keeps running untouched.
  #
  # Requires the STAGING_DATABASE_URL secret (Supabase SESSION pooler, port
  # 5432 — Flyway's JDBC driver doesn't get along with the transaction
  # pooler's statement handling on 6543). One-time setup on a pre-Flyway
  # database: run the "Baseline staging DB" workflow (db-baseline.yml).
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy (staging)
    runs-on: ubuntu-latest
    needs: [test, smoke, security]
    # The gates are PR-only now, so on a main push they report 'skipped' —
    # always() + no-failure lets the deploy proceed past skipped needs while
    # still halting if a gate somehow ran and failed.
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
      && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    concurrency:
      group: deploy-staging
      # Staging is latest-wins: stacked merges to main supersede the deploy in
      # flight instead of queuing three identical ones (2026-07-18 merge train).
      cancel-in-progress: true
    env:
      # Job-level mapping so the sync step's `if:` can see whether the secret
      # exists (the secrets context isn't readable from step conditionals).
      STAGING_STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5 # scripts/flyway.sh parses DATABASE_URL with node
        with:
          node-version: 22
          cache: npm
      - run: npm ci --omit=dev # stripe-sync.ts imports postgres + stripe (prod deps — devDeps unused here)

      - name: Cache Flyway CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/seazn-flyway
          key: flyway-cli-10.22.0-linux-x64

      - name: Pending migrations
        run: bash scripts/flyway.sh info
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Migrate staging database (Flyway)
        run: bash scripts/flyway.sh migrate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # Sport catalog rows are GENERATED from the engine registry — new
      # sports ship as rows, not schema (v6/00). Idempotent upserts keyed by
      # sport/variant; must land before the app deploys or the division
      # builder serves a stale sport_variants catalog (known gotcha).
      - name: Sync sport catalog
        run: npm run sync:sports
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      # Idempotent by design: prices matched by lookup_key, currency_options
      # re-asserted, resulting ids written into `plans` (checkout 503s when
      # unsynced, so this must land before the app). Skips with a notice
      # until the STAGING_STRIPE_SECRET_KEY secret (test-mode key) exists —
      # a missing secret must not brick every main deploy.
      - name: Sync Stripe products/prices
        if: env.STAGING_STRIPE_SECRET_KEY != ''
        run: npm run stripe:sync
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
      - name: Stripe sync skipped
        if: env.STAGING_STRIPE_SECRET_KEY == ''
        run: echo "::warning::STAGING_STRIPE_SECRET_KEY not set — Stripe prices not synced; checkout will 503 until 'npm run stripe:sync' runs against staging."

      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy -c fly.stg.toml --remote-only --build-arg SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_TOKEN }}
          # Source-map upload only (next.config.js). Secret — never in fly.stg.toml.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
